<title>Mis Finanzas · Venezuela</title>
<style>
  :root{
    --bg:#0f1115; --bg2:#171a21; --card:#1c2029; --card2:#232834;
    --line:#2c323e; --txt:#eef1f6; --mut:#9aa3b2; --mut2:#6b7385;
    --acc:#16b894; --acc-d:#0e7c66; --pos:#28c785; --neg:#ff6b6b;
    --bs:#f6c453; --usd:#5aa9ff; --usdt:#26d07c; --warn:#ffb020;
    --r:16px; --rs:11px;
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--txt); line-height:1.45;
    max-width:480px; margin:0 auto; min-height:100vh; position:relative;
    overscroll-behavior-y:contain;
  }
  .app{padding:14px 14px calc(96px + var(--safe-b)) 14px}
  h1,h2,h3{margin:0; font-weight:700}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
  input,select{font-family:inherit; font-size:16px}
  .muted{color:var(--mut)}
  .small{font-size:12px}
  .tiny{font-size:11px}
  .row{display:flex; align-items:center; gap:10px}
  .between{justify-content:space-between}
  .wrap{flex-wrap:wrap}
  .grow{flex:1}
  .center{text-align:center}
  .hide{display:none !important}
  .pos{color:var(--pos)} .neg{color:var(--neg)}
  .mono{font-variant-numeric:tabular-nums; font-feature-settings:"tnum"}

  /* Header */
  .top{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px}
  .top h1{font-size:18px; letter-spacing:.2px}
  .top h1 span{color:var(--acc)}
  .iconbtn{width:38px;height:38px;border-radius:11px;background:var(--card);display:grid;place-items:center;font-size:18px;border:1px solid var(--line)}

  /* Balance hero */
  .hero{background:linear-gradient(160deg,#1b2a27,#171a21 60%); border:1px solid var(--line); border-radius:var(--r); padding:18px; margin-bottom:14px; position:relative; overflow:hidden}
  .hero .lbl{font-size:12px; color:var(--mut); text-transform:uppercase; letter-spacing:1px}
  .hero .big{font-size:32px; font-weight:800; margin:4px 0 2px; letter-spacing:-.5px}
  .hero .big .cur{font-size:15px; color:var(--mut); font-weight:600; margin-left:4px}
  .equ{display:flex; gap:8px; margin-top:14px}
  .equ .e{flex:1; background:rgba(255,255,255,.04); border:1px solid var(--line); border-radius:var(--rs); padding:9px 10px}
  .equ .e .k{font-size:10.5px; color:var(--mut); display:flex; align-items:center; gap:5px}
  .equ .e .v{font-size:15px; font-weight:700; margin-top:3px}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .split{display:flex; gap:8px; margin-top:10px}
  .split .s{flex:1; font-size:11px; color:var(--mut); background:rgba(255,255,255,.03); border-radius:9px; padding:7px 9px}
  .split .s b{display:block; color:var(--txt); font-size:13.5px; margin-top:2px}

  /* Rates bar */
  .rates{display:flex; gap:8px; margin-bottom:14px}
  .rate{flex:1; background:var(--card); border:1px solid var(--line); border-radius:var(--rs); padding:9px 11px; position:relative}
  .rate .rk{font-size:10.5px; color:var(--mut); display:flex; align-items:center; gap:5px}
  .rate .rv{font-size:15px; font-weight:700; margin-top:2px}
  .rate .rs{font-size:9.5px; color:var(--mut2); margin-top:1px}
  .rate.edit{cursor:pointer}
  .pill{font-size:10px; padding:2px 7px; border-radius:20px; background:var(--card2); color:var(--mut); border:1px solid var(--line)}

  /* Cards / sections */
  .sec{margin-bottom:16px}
  .sec>.hd{display:flex; align-items:center; justify-content:space-between; margin:0 2px 9px}
  .sec>.hd h2{font-size:14.5px}
  .addlink{font-size:13px; color:var(--acc); font-weight:600}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:13px}
  .list{display:flex; flex-direction:column; gap:8px}

  .acc{display:flex; align-items:center; gap:11px; background:var(--card); border:1px solid var(--line); border-radius:var(--rs); padding:11px 12px}
  .acc .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:18px;background:var(--card2); flex-shrink:0}
  .acc .nm{font-weight:600; font-size:14px}
  .acc .ty{font-size:11px; color:var(--mut)}
  .acc .bal{text-align:right; font-weight:700; font-size:14px}
  .acc .sub{font-size:11px; color:var(--mut); text-align:right}
  .curtag{font-size:10px; padding:1px 6px; border-radius:6px; font-weight:700; margin-left:6px}
  .t-VES{background:rgba(246,196,83,.15); color:var(--bs)}
  .t-USD{background:rgba(90,169,255,.15); color:var(--usd)}
  .t-USDT{background:rgba(38,208,124,.15); color:var(--usdt)}

  .tx{display:flex; align-items:center; gap:11px; padding:10px 4px; border-bottom:1px solid var(--line)}
  .tx:last-child{border-bottom:none}
  .tx .ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:16px;background:var(--card2);flex-shrink:0}
  .tx .ti{font-weight:600;font-size:13.5px}
  .tx .ts{font-size:11px;color:var(--mut)}
  .tx .amt{font-weight:700;font-size:14px;text-align:right;white-space:nowrap}
  .tx .as{font-size:10.5px;color:var(--mut);text-align:right}

  .bud{padding:11px 0; border-bottom:1px solid var(--line)}
  .bud:last-child{border-bottom:none}
  .bar{height:8px;border-radius:6px;background:var(--card2);overflow:hidden;margin-top:7px}
  .bar i{display:block;height:100%;border-radius:6px;background:var(--acc);transition:width .3s}
  .bar i.over{background:var(--neg)}
  .bar i.warn{background:var(--warn)}

  .goal{padding:12px 0;border-bottom:1px solid var(--line)}
  .goal:last-child{border-bottom:none}
  .ring{--p:0; width:46px;height:46px;border-radius:50%; background:conic-gradient(var(--acc) calc(var(--p)*1%), var(--card2) 0); display:grid;place-items:center; flex-shrink:0}
  .ring span{width:36px;height:36px;border-radius:50%;background:var(--card);display:grid;place-items:center;font-size:11px;font-weight:700}

  .empty{text-align:center;color:var(--mut);padding:22px 10px;font-size:13px}
  .empty .em{font-size:30px;display:block;margin-bottom:6px;opacity:.7}

  /* Tabs */
  .views>section{display:none}
  .views>section.on{display:block; animation:fade .18s ease}
  @keyframes fade{from{opacity:.4;transform:translateY(4px)}to{opacity:1;transform:none}}
  .nav{position:fixed; left:50%; transform:translateX(-50%); bottom:0; width:100%; max-width:480px;
    background:rgba(20,23,30,.94); backdrop-filter:blur(12px); border-top:1px solid var(--line);
    display:flex; padding:7px 6px calc(7px + var(--safe-b)); z-index:40}
  .nav button{flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:4px 0; color:var(--mut2); font-size:10px}
  .nav button .ni{font-size:20px; line-height:1}
  .nav button.on{color:var(--acc)}
  .fab{position:fixed; right:max(16px, calc(50% - 240px + 16px)); bottom:calc(74px + var(--safe-b)); width:58px;height:58px;border-radius:50%;
    background:var(--acc); color:#06241d; font-size:30px; font-weight:700; display:grid;place-items:center;
    box-shadow:0 8px 24px rgba(22,184,148,.4); z-index:45}
  .fab:active{transform:scale(.94)}

  /* Modal */
  .sheet{position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:60; display:none; align-items:flex-end; justify-content:center}
  .sheet.on{display:flex}
  .sheet .panel{background:var(--bg2); width:100%; max-width:480px; border-radius:22px 22px 0 0; padding:16px 16px calc(20px + var(--safe-b));
    max-height:92vh; overflow-y:auto; animation:up .22s ease}
  @keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
  .grab{width:40px;height:4px;border-radius:3px;background:var(--line);margin:0 auto 14px}
  .panel h3{font-size:16px;margin-bottom:14px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12px;color:var(--mut);margin-bottom:6px;font-weight:600}
  .field input, .field select{width:100%; background:var(--card); border:1px solid var(--line); color:var(--txt);
    border-radius:12px; padding:13px 13px; outline:none}
  .field input:focus,.field select:focus{border-color:var(--acc)}
  .amtin{font-size:30px !important; font-weight:800; text-align:center; padding:16px !important; letter-spacing:-.5px}
  .seg{display:flex; gap:8px; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:4px}
  .seg button{flex:1; padding:11px; border-radius:9px; font-weight:700; font-size:13.5px; color:var(--mut)}
  .seg button.on.gasto{background:rgba(255,107,107,.16); color:var(--neg)}
  .seg button.on.ingreso{background:rgba(40,199,133,.16); color:var(--pos)}
  .seg button.on.transferencia{background:rgba(90,169,255,.16); color:var(--usd)}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{padding:8px 13px;border-radius:20px;background:var(--card);border:1px solid var(--line);font-size:13px;color:var(--mut)}
  .chip.on{background:var(--acc-d);border-color:var(--acc);color:#fff;font-weight:600}
  .btn{width:100%; background:var(--acc); color:#06241d; font-weight:800; font-size:15.5px; padding:15px; border-radius:13px; margin-top:4px}
  .btn:active{transform:scale(.99)}
  .btn.sec{background:var(--card); color:var(--txt); border:1px solid var(--line)}
  .btn.danger{background:rgba(255,107,107,.14); color:var(--neg); border:1px solid rgba(255,107,107,.3)}
  .two{display:flex; gap:9px}
  .two>*{flex:1}
  .note{font-size:11.5px; color:var(--mut); background:var(--card); border:1px solid var(--line); border-radius:10px; padding:9px 11px; margin-top:4px}
  .delx{font-size:18px;color:var(--mut2);padding:4px 8px}
  .kgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  a.lnk{color:var(--acc)}
</style>
</head>
<body>
<div class="app">

<script>
"use strict";

/* ============ ESTADO Y PERSISTENCIA ============ */
const KEY = "finzasVE_v1";
const CUR = ["VES","USD","USDT"];
const DEFAULT_RATES = { bcv:596.78, binance:792.99 }; // referenciales si no hay internet

const ACCOUNT_TYPES = [
  {t:"Banco Bs", c:"VES", ic:"🏦"},
  {t:"Pago Móvil", c:"VES", ic:"📲"},
  {t:"Efectivo Bs", c:"VES", ic:"💵"},
  {t:"Zelle", c:"USD", ic:"💳"},
  {t:"Efectivo USD", c:"USD", ic:"💵"},
  {t:"Binance", c:"USDT", ic:"🟡"},
  {t:"Otra cripto", c:"USDT", ic:"₿"},
  {t:"Otra", c:"USD", ic:"📦"},
];
const CATS = {
  gasto:["Comida","Mercado","Transporte","Servicios","Salud","Hogar","Educación","Ocio","Ropa","Otros"],
  ingreso:["Salario","Freelance","Remesa","Venta","Intereses","Otros"]
};
const CAT_IC = {Comida:"🍽️",Mercado:"🛒",Transporte:"🚗",Servicios:"💡",Salud:"⚕️",Hogar:"🏠",Educación:"📚",Ocio:"🎉",Ropa:"👕",Otros:"📦",Salario:"💼",Freelance:"💻",Remesa:"✈️",Venta:"🏷️",Intereses:"📈"};

let state = load();

function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){ const s = JSON.parse(raw); return migrate(s); }
  }catch(e){ console.warn("load fail",e); }
  return seed();
}
function migrate(s){
  s.accounts = s.accounts||[]; s.txns = s.txns||[]; s.budgets = s.budgets||[];
  s.goals = s.goals||[];
  s.rates = Object.assign({bcv:DEFAULT_RATES.bcv, binance:DEFAULT_RATES.binance, source:"referencial", updatedAt:null, manualBcv:null, manualBinance:null}, s.rates||{});
  s.settings = Object.assign({cotizaveKey:"", lastUsedAccount:null}, s.settings||{});
  return s;
}
function seed(){
  return migrate({
    accounts:[
      {id:uid(), name:"Banco Bs", type:"Banco Bs", currency:"VES", opening:0, ic:"🏦"},
      {id:uid(), name:"Efectivo USD", type:"Efectivo USD", currency:"USD", opening:0, ic:"💵"},
      {id:uid(), name:"Binance", type:"Binance", currency:"USDT", opening:0, ic:"🟡"},
    ],
    txns:[], budgets:[], goals:[]
  });
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){ alert("No se pudo guardar (almacenamiento lleno o bloqueado)."); } }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

/* ============ TASAS Y CONVERSIÓN ============ */
function rate(cur){ // Bs por 1 unidad de la moneda
  if(cur==="VES") return 1;
  if(cur==="USD") return effBcv();
  if(cur==="USDT") return effBinance();
  return 1;
}
function effBcv(){ return num(state.rates.manualBcv) || num(state.rates.bcv) || DEFAULT_RATES.bcv; }
function effBinance(){ return num(state.rates.manualBinance) || num(state.rates.binance) || DEFAULT_RATES.binance; }
function num(x){ const n = parseFloat(x); return isFinite(n)&&n>0 ? n : 0; }

function toBs(amount, cur){ return amount * rate(cur); }
function fromBs(bs, cur){ const r = rate(cur); return r? bs/r : 0; }
function convert(amount, from, to){ return fromBs(toBs(amount, from), to); }

async function fetchRates(){
  let bcv=null, binance=null, srcB="", srcN="";
  // 1) dolarapi: BCV oficial + paralelo (confirmado, CORS abierto)
  try{
    const r = await fetch("https://ve.dolarapi.com/v1/dolares", {cache:"no-store"});
    if(r.ok){
      const j = await r.json();
      const of = j.find(x=>x.fuente==="oficial");
      const par = j.find(x=>x.fuente==="paralelo");
      if(of && of.promedio){ bcv = of.promedio; srcB="BCV (dolarapi)"; }
      if(par && par.promedio){ binance = par.promedio; srcN="Paralelo (dolarapi)"; }
    }
  }catch(e){ console.warn("dolarapi fail", e); }
  // 2) cotizave con API key (opcional) -> Binance exacto
  if(state.settings.cotizaveKey){
    try{
      const r = await fetch("https://api.cotizave.com/v1/fx/rates", {headers:{"X-API-Key":state.settings.cotizaveKey, "Accept":"application/json"}});
      if(r.ok){
        const j = await r.json();
        const arr = j.rates||[];
        const bn = arr.find(x=>x.market==="binance_p2p");
        const bc = arr.find(x=>x.market==="bcv");
        if(bn && (bn.mid||bn.ask)){ binance = bn.mid||bn.ask; srcN="Binance P2P (cotizave)"; }
        if(bc && bc.mid){ bcv = bc.mid; srcB="BCV (cotizave)"; }
      }
    }catch(e){ console.warn("cotizave fail", e); }
  }
  if(bcv || binance){
    if(bcv) state.rates.bcv = round2(bcv);
    if(binance) state.rates.binance = round2(binance);
    state.rates.source = [srcB,srcN].filter(Boolean).join(" · ");
    state.rates.updatedAt = new Date().toISOString();
    save();
    return true;
  }
  return false; // queda la última cacheada
}

/* ============ CÁLCULOS ============ */
function accBalance(acc){
  let b = num0(acc.opening);
  for(const t of state.txns){
    if(t.kind==="ingreso" && t.accountId===acc.id) b += t.amount;
    else if(t.kind==="gasto" && t.accountId===acc.id) b -= t.amount;
    else if(t.kind==="transferencia"){
      if(t.accountId===acc.id) b -= t.amount;
      if(t.toAccountId===acc.id) b += (t.toAmount!=null? t.toAmount : t.amount);
    }
  }
  return b;
}
function num0(x){ const n=parseFloat(x); return isFinite(n)?n:0; }

function totals(){
  let bs=0, divisasUsd=0, soloBs=0;
  for(const a of state.accounts){
    const bal = accBalance(a);
    bs += toBs(bal, a.currency);
    if(a.currency==="VES") soloBs += bal;
    else divisasUsd += convert(bal, a.currency, "USD"); // USD y USDT a valor nominal ~ dólares
  }
  return {
    bs,
    usd: fromBs(bs, "USD"),
    usdt: fromBs(bs, "USDT"),
    divisasUsd,        // dólares "reales" (USD + USDT nominal)
    soloBs             // bolívares
  };
}
function monthKey(d){ const x=new Date(d); return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0"); }
function curMonth(){ return monthKey(new Date()); }

function monthFlows(mk){
  let inUsd=0, outUsd=0;
  for(const t of state.txns){
    if(monthKey(t.date)!==mk) continue;
    if(t.kind==="ingreso") inUsd += convert(t.amount, t.currency, "USD");
    else if(t.kind==="gasto") outUsd += convert(t.amount, t.currency, "USD");
  }
  return {inUsd, outUsd, netUsd:inUsd-outUsd};
}
function budgetSpent(b, mk){
  let s=0;
  for(const t of state.txns){
    if(t.kind!=="gasto") continue;
    if(t.category!==b.category) continue;
    if(monthKey(t.date)!==mk) continue;
    s += convert(t.amount, t.currency, b.currency);
  }
  return s;
}

/* ============ FORMATO ============ */
const fmtBs = new Intl.NumberFormat("es-VE",{minimumFractionDigits:2, maximumFractionDigits:2});
const fmtBs0 = new Intl.NumberFormat("es-VE",{maximumFractionDigits:0});
const fmtUsd = new Intl.NumberFormat("es-VE",{minimumFractionDigits:2, maximumFractionDigits:2});
function money(amount, cur, opt){
  opt = opt||{};
  const a = isFinite(amount)?amount:0;
  if(cur==="VES"){ return (opt.big? fmtBs0.format(a): fmtBs.format(a)) + " Bs"; }
  if(cur==="USD"){ return "$" + fmtUsd.format(a); }
  if(cur==="USDT"){ return fmtUsd.format(a) + " USDT"; }
  return fmtUsd.format(a);
}
function round2(x){ return Math.round(x*100)/100; }
function fechaCorta(d){
  const x=new Date(d), h=new Date();
  const dd = String(x.getDate()).padStart(2,"0"), mm=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"][x.getMonth()];
  let s = dd+" "+mm;
  if(x.toDateString()===h.toDateString()) s="Hoy";
  return s;
}
function timeAgo(iso){
  if(!iso) return "sin actualizar";
  const m = Math.floor((Date.now()-new Date(iso))/60000);
  if(m<1) return "ahora"; if(m<60) return "hace "+m+" min";
  const h=Math.floor(m/60); if(h<24) return "hace "+h+" h";
  return "hace "+Math.floor(h/24)+" d";
}

/* ============ RENDER ============ */
function render(){
  renderHero(); renderRatesBar(); renderMonth(); renderRecent();
  renderAllTx(); renderBudgets(); renderGoals(); renderAccounts();
}
function renderHero(){
  const t = totals();
  document.getElementById("heroBs").innerHTML = fmtBs0.format(t.bs)+'<span class="cur">Bs</span>';
  document.getElementById("heroUsd").textContent = "$"+fmtUsd.format(t.usd);
  document.getElementById("heroUsdt").textContent = fmtUsd.format(t.usdt)+" USDT";
  document.getElementById("splitDiv").textContent = "$"+fmtUsd.format(t.divisasUsd);
  document.getElementById("splitBs").textContent = fmtBs0.format(t.soloBs)+" Bs";
}
function renderRatesBar(){
  const r = state.rates;
  const manB = state.rates.manualBcv? " ✍️":"";
  const manN = state.rates.manualBinance? " ✍️":"";
  document.getElementById("ratesBar").innerHTML = `
    <div class="rate edit" data-rate="1">
      <div class="rk"><span class="dot" style="background:var(--usd)"></span>BCV · USD${manB}</div>
      <div class="rv mono">${fmtBs.format(effBcv())} <span class="tiny muted">Bs</span></div>
      <div class="rs">${timeAgo(r.updatedAt)}</div>
    </div>
    <div class="rate edit" data-rate="1">
      <div class="rk"><span class="dot" style="background:var(--usdt)"></span>Binance · USDT${manN}</div>
      <div class="rv mono">${fmtBs.format(effBinance())} <span class="tiny muted">Bs</span></div>
      <div class="rs">${(r.source||"referencial")}</div>
    </div>`;
}
function renderMonth(){
  const mk=curMonth();
  const f=monthFlows(mk);
  document.getElementById("monthLbl").textContent = new Date().toLocaleDateString("es-VE",{month:"long",year:"numeric"});
  document.getElementById("mIn").textContent = "$"+fmtUsd.format(f.inUsd);
  document.getElementById("mOut").textContent = "$"+fmtUsd.format(f.outUsd);
  const net=document.getElementById("mNet");
  net.textContent = (f.netUsd>=0?"+$":"-$")+fmtUsd.format(Math.abs(f.netUsd));
  net.className = "mono "+(f.netUsd>=0?"pos":"neg");
}
function txRow(t){
  const acc = state.accounts.find(a=>a.id===t.accountId);
  const sign = t.kind==="ingreso"?"+": t.kind==="gasto"?"-":"";
  const cls = t.kind==="ingreso"?"pos": t.kind==="gasto"?"neg":"";
  let title, ic;
  if(t.kind==="transferencia"){
    const to = state.accounts.find(a=>a.id===t.toAccountId);
    title = "Transferencia"; ic="🔄";
    const sub = (acc?acc.name:"?")+" → "+(to?to.name:"?");
    return `<div class="tx" data-tx="${t.id}">
      <div class="ic">${ic}</div>
      <div class="grow"><div class="ti">${title}</div><div class="ts">${sub} · ${fechaCorta(t.date)}</div></div>
      <div><div class="amt mono">${money(t.amount,t.currency)}</div><div class="as">${acc?acc.currency:""}</div></div>
    </div>`;
  }
  title = t.category||(t.kind==="ingreso"?"Ingreso":"Gasto");
  ic = CAT_IC[t.category]||(t.kind==="ingreso"?"💰":"🧾");
  return `<div class="tx" data-tx="${t.id}">
    <div class="ic">${ic}</div>
    <div class="grow"><div class="ti">${title}${t.note?' · <span class="muted">'+esc(t.note)+'</span>':''}</div>
      <div class="ts">${acc?esc(acc.name):"?"} · ${fechaCorta(t.date)}</div></div>
    <div><div class="amt mono ${cls}">${sign}${money(t.amount,t.currency)}</div></div>
  </div>`;
}
function renderRecent(){
  const el=document.getElementById("recentTx");
  const tx=[...state.txns].sort(byDateDesc).slice(0,6);
  el.innerHTML = tx.length? tx.map(txRow).join("") : emptyBox("🧾","Aún no hay movimientos","Toca el botón + para registrar tu primer gasto o ingreso");
}
function renderAllTx(){
  const el=document.getElementById("allTx");
  const tx=[...state.txns].sort(byDateDesc);
  document.getElementById("txCount").textContent = tx.length+" movimientos";
  el.innerHTML = tx.length? tx.map(txRow).join("") : emptyBox("🧾","Sin movimientos","Registra gastos e ingresos con el botón +");
}
function renderBudgets(){
  const el=document.getElementById("budgets"); const mk=curMonth();
  if(!state.budgets.length){ el.innerHTML=emptyBox("🎯","Sin presupuestos","Define un límite mensual por categoría para controlar tus gastos"); return; }
  el.innerHTML = state.budgets.map(b=>{
    const spent=budgetSpent(b,mk), lim=num0(b.limit);
    const pct = lim? Math.min(100, spent/lim*100):0;
    const over = spent>lim;
    const cls = over?"over": pct>80?"warn":"";
    return `<div class="bud" data-bud="${b.id}">
      <div class="row between"><div><b>${CAT_IC[b.category]||"📦"} ${esc(b.category)}</b></div>
        <div class="small ${over?'neg':'muted'}">${money(spent,b.currency)} / ${money(lim,b.currency)}</div></div>
      <div class="bar"><i class="${cls}" style="width:${pct}%"></i></div>
      <div class="tiny muted" style="margin-top:5px">${over? "Te pasaste por "+money(spent-lim,b.currency): "Te quedan "+money(lim-spent,b.currency)} este mes</div>
    </div>`;
  }).join("");
}
function renderGoals(){
  const el=document.getElementById("goals");
  if(!state.goals.length){ el.innerHTML=emptyBox("🐷","Sin metas","Crea una meta (ej. fondo de emergencia $500) y registra tus aportes"); return; }
  el.innerHTML = state.goals.map(g=>{
    const saved=num0(g.saved), tgt=num0(g.target);
    const pct = tgt? Math.min(100, saved/tgt*100):0;
    return `<div class="goal" data-goal="${g.id}">
      <div class="row" style="gap:13px">
        <div class="ring" style="--p:${pct}"><span>${Math.round(pct)}%</span></div>
        <div class="grow"><b>${esc(g.name)}</b>
          <div class="small muted">${money(saved,g.currency)} de ${money(tgt,g.currency)}</div>
          <div class="tiny muted">${pct>=100? "🎉 ¡Meta cumplida!": "Faltan "+money(tgt-saved,g.currency)}</div></div>
        <button class="btn sec" style="width:auto;padding:9px 14px;margin:0" data-addsave="${g.id}">+ Aporte</button>
      </div>
    </div>`;
  }).join("");
}
function renderAccounts(){
  const el=document.getElementById("accounts");
  el.innerHTML = state.accounts.map(a=>{
    const bal=accBalance(a);
    const sub = a.currency==="VES"? "≈ $"+fmtUsd.format(convert(bal,"VES","USD"))
              : "≈ "+fmtBs0.format(toBs(bal,a.currency))+" Bs";
    return `<div class="acc" data-acc="${a.id}">
      <div class="ic">${a.ic||"📦"}</div>
      <div class="grow"><div class="nm">${esc(a.name)}<span class="curtag t-${a.currency}">${a.currency}</span></div>
        <div class="ty">${esc(a.type||"")}</div></div>
      <div><div class="bal mono">${money(bal,a.currency)}</div><div class="sub mono">${sub}</div></div>
    </div>`;
  }).join("") || emptyBox("🏦","Sin cuentas","Agrega tus cuentas en Bs, USD y USDT");
}
function emptyBox(em,t,s){ return `<div class="empty"><span class="em">${em}</span><b>${t}</b><div class="small" style="margin-top:4px">${s}</div></div>`; }
function byDateDesc(a,b){ return (b.date||"").localeCompare(a.date||"") || (b.createdAt||"").localeCompare(a.createdAt||""); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ============ NAVEGACIÓN ============ */
function go(view){
  document.querySelectorAll(".views>section").forEach(s=>s.classList.toggle("on", s.id==="v-"+view));
  document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("on", b.dataset.go===view));
  window.scrollTo(0,0);
}
document.querySelectorAll("[data-go]").forEach(b=> b.addEventListener("click",()=>go(b.dataset.go)) );

/* ============ SHEETS / MODALES ============ */
const sheet=document.getElementById("sheet"), panel=document.getElementById("panel");
function openSheet(html){ panel.innerHTML='<div class="grab"></div>'+html; sheet.classList.add("on"); }
function closeSheet(){ sheet.classList.remove("on"); }
sheet.addEventListener("click", e=>{ if(e.target===sheet) closeSheet(); });

/* ---- Agregar / editar transacción ---- */
let txDraft = null;
function openTx(existing){
  const last = state.settings.lastUsedAccount;
  txDraft = existing? JSON.parse(JSON.stringify(existing)) : {
    id:null, kind:"gasto", amount:"", currency:null, accountId: (state.accounts.find(a=>a.id===last)||state.accounts[0]||{}).id||null,
    toAccountId:null, toAmount:null, category:CATS.gasto[0], note:"", date: todayISO()
  };
  drawTx();
}
function todayISO(){ const d=new Date(); return d.toISOString().slice(0,10); }
function drawTx(){
  const d=txDraft;
  const acc = state.accounts.find(a=>a.id===d.accountId);
  d.currency = acc? acc.currency : d.currency;
  const accOpts = state.accounts.map(a=>`<option value="${a.id}" ${a.id===d.accountId?"selected":""}>${esc(a.name)} (${a.currency})</option>`).join("");
  const isTr = d.kind==="transferencia";
  let body = `
    <h3>${d.id? "Editar":"Nuevo"} movimiento</h3>
    <div class="field"><div class="seg">
      <button class="${d.kind==='gasto'?'on gasto':''}" data-kind="gasto">Gasto</button>
      <button class="${d.kind==='ingreso'?'on ingreso':''}" data-kind="ingreso">Ingreso</button>
      <button class="${d.kind==='transferencia'?'on transferencia':''}" data-kind="transferencia">Transfer.</button>
    </div></div>
    <div class="field"><input class="amtin mono" id="txAmt" inputmode="decimal" placeholder="0,00" value="${d.amount!==''&&d.amount!=null?String(d.amount).replace('.',','):''}">
      <div class="center small muted" style="margin-top:4px">${acc? "en "+acc.currency : ""}</div></div>
    <div class="field"><label>${isTr?"Desde la cuenta":"Cuenta"}</label><select id="txAcc">${accOpts}</select></div>`;

  if(isTr){
    const toOpts = state.accounts.filter(a=>a.id!==d.accountId).map(a=>`<option value="${a.id}" ${a.id===d.toAccountId?"selected":""}>${esc(a.name)} (${a.currency})</option>`).join("");
    const toAcc = state.accounts.find(a=>a.id===(d.toAccountId|| (state.accounts.find(a=>a.id!==d.accountId)||{}).id));
    const suggested = (acc&&toAcc&&d.amount)? round2(convert(num0(d.amount), acc.currency, toAcc.currency)) : "";
    body += `<div class="field"><label>Hacia la cuenta</label><select id="txTo">${toOpts}</select></div>
      <div class="field"><label>Monto recibido ${toAcc?"("+toAcc.currency+")":""}</label>
        <input id="txToAmt" inputmode="decimal" placeholder="${suggested!==''?fmtUsd.format(suggested).replace('.',','):'0,00'}" value="${d.toAmount!=null?String(d.toAmount).replace('.',','):''}">
        <div class="note">Sugerido por tasa actual: ${suggested!==""? money(suggested,toAcc?toAcc.currency:""):"—"}. Puedes ajustarlo al monto real que recibiste.</div></div>`;
  } else {
    const cats = CATS[d.kind];
    if(!cats.includes(d.category)) d.category=cats[0];
    body += `<div class="field"><label>Categoría</label><div class="chips" id="txCats">
      ${cats.map(c=>`<button class="chip ${c===d.category?'on':''}" data-cat="${esc(c)}">${CAT_IC[c]||""} ${c}</button>`).join("")}</div></div>
      <div class="field"><label>Nota (opcional)</label><input id="txNote" placeholder="Ej. almuerzo, gasolina…" value="${esc(d.note||"")}"></div>`;
  }
  body += `<div class="field"><label>Fecha</label><input type="date" id="txDate" value="${d.date}"></div>
    <button class="btn" id="txSave">${d.id?"Guardar cambios":"Registrar"}</button>
    ${d.id?'<button class="btn danger" id="txDel" style="margin-top:9px">Eliminar</button>':''}`;
  openSheet(body);

  // listeners
  panel.querySelectorAll("[data-kind]").forEach(b=> b.addEventListener("click",()=>{ syncTx(); d.kind=b.dataset.kind; drawTx(); }));
  panel.querySelectorAll("[data-cat]").forEach(b=> b.addEventListener("click",()=>{ syncTx(); d.category=b.dataset.cat; drawTx(); }));
  const accSel=panel.querySelector("#txAcc"); if(accSel) accSel.addEventListener("change",()=>{ syncTx(); drawTx(); });
  const toSel=panel.querySelector("#txTo"); if(toSel) toSel.addEventListener("change",()=>{ syncTx(); drawTx(); });
  const amt=panel.querySelector("#txAmt"); if(amt){ amt.focus(); }
  panel.querySelector("#txSave").addEventListener("click", saveTx);
  const del=panel.querySelector("#txDel"); if(del) del.addEventListener("click", ()=>{ if(confirm("¿Eliminar este movimiento?")){ state.txns=state.txns.filter(x=>x.id!==d.id); save(); closeSheet(); render(); } });
}
function parseNum(v){ if(v==null) return NaN; return parseFloat(String(v).replace(/\./g,"").replace(",",".")); }
function syncTx(){
  const d=txDraft;
  const amt=panel.querySelector("#txAmt"); if(amt) d.amount = amt.value.trim()===""?"":parseNum(amt.value);
  const accSel=panel.querySelector("#txAcc"); if(accSel) d.accountId=accSel.value;
  const toSel=panel.querySelector("#txTo"); if(toSel) d.toAccountId=toSel.value;
  const toAmt=panel.querySelector("#txToAmt"); if(toAmt) d.toAmount = toAmt.value.trim()===""?null:parseNum(toAmt.value);
  const note=panel.querySelector("#txNote"); if(note) d.note=note.value;
  const date=panel.querySelector("#txDate"); if(date) d.date=date.value||todayISO();
}
function saveTx(){
  syncTx();
  const d=txDraft;
  const amount = parseFloat(d.amount);
  if(!isFinite(amount) || amount<=0){ alert("Escribe un monto válido."); return; }
  const acc=state.accounts.find(a=>a.id===d.accountId);
  if(!acc){ alert("Selecciona una cuenta."); return; }
  if(d.kind==="transferencia"){
    if(!d.toAccountId || d.toAccountId===d.accountId){ alert("Elige una cuenta destino distinta."); return; }
    const toAcc=state.accounts.find(a=>a.id===d.toAccountId);
    if(d.toAmount==null || !isFinite(d.toAmount)) d.toAmount = round2(convert(amount, acc.currency, toAcc.currency));
  }
  const rec = {
    id: d.id||uid(), kind:d.kind, amount:round2(amount), currency:acc.currency,
    accountId:d.accountId, toAccountId: d.kind==="transferencia"?d.toAccountId:null,
    toAmount: d.kind==="transferencia"? round2(d.toAmount): null,
    category: d.kind==="transferencia"? null : d.category, note:(d.note||"").trim(), date:d.date,
    createdAt: d.id? (state.txns.find(x=>x.id===d.id)||{}).createdAt||new Date().toISOString() : new Date().toISOString()
  };
  if(d.id){ state.txns = state.txns.map(x=> x.id===d.id? rec : x); }
  else { state.txns.push(rec); }
  state.settings.lastUsedAccount = d.accountId;
  save(); closeSheet(); render();
}

/* ---- Cuentas ---- */
function openAccount(existing){
  const e = existing||{id:null,name:"",type:"Banco Bs",currency:"VES",opening:0,ic:"🏦"};
  const typeOpts = ACCOUNT_TYPES.map(t=>`<option value="${t.t}" data-c="${t.c}" data-ic="${t.ic}" ${t.t===e.type?"selected":""}>${t.ic} ${t.t}</option>`).join("");
  const curOpts = CUR.map(c=>`<option value="${c}" ${c===e.currency?"selected":""}>${c}</option>`).join("");
  openSheet(`<h3>${e.id?"Editar":"Nueva"} cuenta</h3>
    <div class="field"><label>Tipo</label><select id="acType">${typeOpts}</select></div>
    <div class="field"><label>Nombre</label><input id="acName" placeholder="Ej. Banesco, Zelle mamá…" value="${esc(e.name)}"></div>
    <div class="field"><label>Moneda</label><select id="acCur">${curOpts}</select></div>
    <div class="field"><label>Saldo actual (inicial)</label><input id="acOpen" inputmode="decimal" placeholder="0,00" value="${e.opening?String(e.opening).replace('.',','):''}">
      <div class="note">Pon cuánto tienes hoy en esta cuenta. A partir de aquí, cada movimiento ajusta el saldo solo.</div></div>
    <button class="btn" id="acSave">${e.id?"Guardar":"Crear cuenta"}</button>
    ${e.id?'<button class="btn danger" id="acDel" style="margin-top:9px">Eliminar cuenta</button>':''}`);
  const typeSel=panel.querySelector("#acType");
  typeSel.addEventListener("change",()=>{
    const o=typeSel.selectedOptions[0];
    panel.querySelector("#acCur").value=o.dataset.c;
    if(!panel.querySelector("#acName").value) panel.querySelector("#acName").value=o.value;
  });
  panel.querySelector("#acSave").addEventListener("click",()=>{
    const o=typeSel.selectedOptions[0];
    const rec={ id:e.id||uid(), name:(panel.querySelector("#acName").value||o.value).trim(),
      type:typeSel.value, currency:panel.querySelector("#acCur").value,
      opening:parseNum(panel.querySelector("#acOpen").value)||0, ic:o.dataset.ic };
    if(!rec.name){ alert("Ponle un nombre a la cuenta."); return; }
    if(e.id) state.accounts=state.accounts.map(a=>a.id===e.id?rec:a); else state.accounts.push(rec);
    save(); closeSheet(); render();
  });
  const del=panel.querySelector("#acDel");
  if(del) del.addEventListener("click",()=>{
    const hasTx = state.txns.some(t=>t.accountId===e.id||t.toAccountId===e.id);
    if(hasTx && !confirm("Esta cuenta tiene movimientos. Si la eliminas, esos movimientos quedarán huérfanos. ¿Continuar?")) return;
    if(!hasTx && !confirm("¿Eliminar esta cuenta?")) return;
    state.accounts=state.accounts.filter(a=>a.id!==e.id); save(); closeSheet(); render();
  });
}

/* ---- Presupuestos ---- */
function openBudget(existing){
  const e=existing||{id:null,category:CATS.gasto[0],currency:"USD",limit:""};
  const catOpts=CATS.gasto.map(c=>`<option ${c===e.category?"selected":""}>${c}</option>`).join("");
  const curOpts=CUR.map(c=>`<option value="${c}" ${c===e.currency?"selected":""}>${c}</option>`).join("");
  openSheet(`<h3>${e.id?"Editar":"Nuevo"} presupuesto</h3>
    <div class="field"><label>Categoría</label><select id="bCat">${catOpts}</select></div>
    <div class="two">
      <div class="field"><label>Límite mensual</label><input id="bLim" inputmode="decimal" placeholder="0,00" value="${e.limit?String(e.limit).replace('.',','):''}"></div>
      <div class="field"><label>Moneda</label><select id="bCur">${curOpts}</select></div>
    </div>
    <div class="note">El gasto de esta categoría se convierte a la moneda del presupuesto con la tasa actual, sin importar en qué moneda lo pagaste.</div>
    <button class="btn" id="bSave" style="margin-top:10px">${e.id?"Guardar":"Crear"}</button>
    ${e.id?'<button class="btn danger" id="bDel" style="margin-top:9px">Eliminar</button>':''}`);
  panel.querySelector("#bSave").addEventListener("click",()=>{
    const rec={id:e.id||uid(), category:panel.querySelector("#bCat").value, currency:panel.querySelector("#bCur").value, limit:parseNum(panel.querySelector("#bLim").value)||0};
    if(rec.limit<=0){ alert("Pon un límite mayor a 0."); return; }
    if(e.id) state.budgets=state.budgets.map(b=>b.id===e.id?rec:b); else state.budgets.push(rec);
    save(); closeSheet(); render();
  });
  const del=panel.querySelector("#bDel"); if(del) del.addEventListener("click",()=>{ state.budgets=state.budgets.filter(b=>b.id!==e.id); save(); closeSheet(); render(); });
}

/* ---- Metas ---- */
function openGoal(existing){
  const e=existing||{id:null,name:"",currency:"USD",target:"",saved:0};
  const curOpts=CUR.map(c=>`<option value="${c}" ${c===e.currency?"selected":""}>${c}</option>`).join("");
  openSheet(`<h3>${e.id?"Editar":"Nueva"} meta</h3>
    <div class="field"><label>Nombre</label><input id="gName" placeholder="Ej. Fondo de emergencia" value="${esc(e.name)}"></div>
    <div class="two">
      <div class="field"><label>Meta</label><input id="gTgt" inputmode="decimal" placeholder="0,00" value="${e.target?String(e.target).replace('.',','):''}"></div>
      <div class="field"><label>Moneda</label><select id="gCur">${curOpts}</select></div>
    </div>
    <div class="field"><label>Ya ahorrado</label><input id="gSaved" inputmode="decimal" placeholder="0,00" value="${e.saved?String(e.saved).replace('.',','):''}"></div>
    <button class="btn" id="gSave">${e.id?"Guardar":"Crear meta"}</button>
    ${e.id?'<button class="btn danger" id="gDel" style="margin-top:9px">Eliminar</button>':''}`);
  panel.querySelector("#gSave").addEventListener("click",()=>{
    const rec={id:e.id||uid(), name:panel.querySelector("#gName").value.trim(), currency:panel.querySelector("#gCur").value,
      target:parseNum(panel.querySelector("#gTgt").value)||0, saved:parseNum(panel.querySelector("#gSaved").value)||0};
    if(!rec.name){ alert("Ponle nombre a la meta."); return; }
    if(rec.target<=0){ alert("La meta debe ser mayor a 0."); return; }
    if(e.id) state.goals=state.goals.map(g=>g.id===e.id?rec:g); else state.goals.push(rec);
    save(); closeSheet(); render();
  });
  const del=panel.querySelector("#gDel"); if(del) del.addEventListener("click",()=>{ state.goals=state.goals.filter(g=>g.id!==e.id); save(); closeSheet(); render(); });
}
function openAddSave(id){
  const g=state.goals.find(x=>x.id===id); if(!g) return;
  openSheet(`<h3>Aporte a "${esc(g.name)}"</h3>
    <div class="field"><input class="amtin mono" id="svAmt" inputmode="decimal" placeholder="0,00"><div class="center small muted">en ${g.currency}</div></div>
    <div class="note">Ahorrado: ${money(num0(g.saved),g.currency)} de ${money(num0(g.target),g.currency)}.</div>
    <button class="btn" id="svSave" style="margin-top:10px">Agregar aporte</button>
    <button class="btn sec" id="svSub" style="margin-top:9px">Retirar (restar)</button>`);
  panel.querySelector("#svAmt").focus();
  const apply=(sign)=>{ const v=parseNum(panel.querySelector("#svAmt").value); if(!isFinite(v)||v<=0){alert("Monto inválido");return;}
    g.saved = Math.max(0, num0(g.saved)+sign*v); save(); closeSheet(); render(); };
  panel.querySelector("#svSave").addEventListener("click",()=>apply(1));
  panel.querySelector("#svSub").addEventListener("click",()=>apply(-1));
}

/* ---- Tasas ---- */
function openRates(){
  const r=state.rates;
  openSheet(`<h3>Tasas de cambio</h3>
    <div class="note" style="margin-bottom:14px">Última actualización automática: <b>${timeAgo(r.updatedAt)}</b>${r.source?" · "+esc(r.source):""}.</div>
    <button class="btn" id="rRefresh" style="margin-bottom:16px">🔄 Actualizar ahora (internet)</button>
    <div class="field"><label>BCV · Bs por USD (manual)</label><input id="rBcv" inputmode="decimal" placeholder="Auto: ${fmtBs.format(num(state.rates.bcv)||DEFAULT_RATES.bcv)}" value="${state.rates.manualBcv?String(state.rates.manualBcv).replace('.',','):''}"></div>
    <div class="field"><label>Binance · Bs por USDT (manual)</label><input id="rBin" inputmode="decimal" placeholder="Auto: ${fmtBs.format(num(state.rates.binance)||DEFAULT_RATES.binance)}" value="${state.rates.manualBinance?String(state.rates.manualBinance).replace('.',','):''}"></div>
    <div class="note">Si escribes una tasa manual, esa manda sobre la automática. Déjalo vacío para volver a usar la tasa de internet.</div>
    <button class="btn" id="rSave" style="margin-top:12px">Guardar tasas</button>`);
  panel.querySelector("#rRefresh").addEventListener("click", async (ev)=>{
    ev.target.textContent="Actualizando…"; ev.target.disabled=true;
    const ok=await fetchRates();
    closeSheet(); render();
    if(!ok) alert("No se pudo obtener la tasa (sin internet o fuente caída). Se mantiene la última conocida. Puedes ponerla manual.");
  });
  panel.querySelector("#rSave").addEventListener("click",()=>{
    const b=parseNum(panel.querySelector("#rBcv").value), n=parseNum(panel.querySelector("#rBin").value);
    state.rates.manualBcv = isFinite(b)&&b>0? round2(b): null;
    state.rates.manualBinance = isFinite(n)&&n>0? round2(n): null;
    save(); closeSheet(); render();
  });
}

/* ---- Ajustes / Respaldo ---- */
function openSettings(){
  openSheet(`<h3>Ajustes y respaldo</h3>
    <div class="field"><label>API key de Cotizave (opcional · Binance exacto)</label>
      <input id="setKey" placeholder="ctz_live_…" value="${esc(state.settings.cotizaveKey||"")}">
      <div class="note">Gratis en cotizave.com (1.500 consultas/mes). Con esto la tasa "Binance" usa el P2P exacto. Sin ella, se usa el paralelo (≈1% de diferencia).</div></div>
    <button class="btn sec" id="setKeySave">Guardar API key</button>
    <div style="height:18px"></div>
    <label class="small muted" style="font-weight:600">Respaldo de tus datos</label>
    <div class="note" style="margin:6px 0 10px">Tus datos viven solo en este dispositivo. Exporta de vez en cuando para no perderlos si cambias de teléfono o limpias el navegador.</div>
    <div class="two">
      <button class="btn sec" id="setExport">⬇️ Exportar</button>
      <button class="btn sec" id="setImport">⬆️ Importar</button>
    </div>
    <input type="file" id="setFile" accept="application/json" class="hide">
    <div style="height:18px"></div>
    <button class="btn danger" id="setReset">Borrar todo y empezar de cero</button>
    <div class="note" style="margin-top:14px">Tasas de hoy: BCV ${fmtBs.format(effBcv())} · Binance ${fmtBs.format(effBinance())} Bs.</div>`);
  panel.querySelector("#setKeySave").addEventListener("click",()=>{ state.settings.cotizaveKey=panel.querySelector("#setKey").value.trim(); save(); alert("Guardado. Pulsa actualizar en 💱 para traer la tasa de Binance."); });
  panel.querySelector("#setExport").addEventListener("click", exportData);
  panel.querySelector("#setImport").addEventListener("click",()=>panel.querySelector("#setFile").click());
  panel.querySelector("#setFile").addEventListener("change", importData);
  panel.querySelector("#setReset").addEventListener("click",()=>{ if(confirm("¿Seguro? Esto borra cuentas, movimientos, presupuestos y metas de este dispositivo.")){ localStorage.removeItem(KEY); state=load(); closeSheet(); render(); } });
}
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="finanzas-respaldo-"+todayISO()+".json"; a.click(); URL.revokeObjectURL(a.href);
}
function importData(ev){
  const f=ev.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ const s=JSON.parse(rd.result); if(!s.accounts) throw 0; if(confirm("Esto reemplaza tus datos actuales por los del respaldo. ¿Continuar?")){ state=migrate(s); save(); closeSheet(); render(); } }catch(e){ alert("Archivo inválido."); } };
  rd.readAsText(f);
}

/* ============ EVENTOS GLOBALES ============ */
document.getElementById("fab").addEventListener("click",()=>{ if(!state.accounts.length){ alert("Primero crea al menos una cuenta."); openAccount(); return; } openTx(); });
document.getElementById("btnRates").addEventListener("click", openRates);
document.querySelector('[data-rate]')&&0;
document.getElementById("ratesBar").addEventListener("click", e=>{ if(e.target.closest("[data-rate]")) openRates(); });
document.getElementById("btnSettings").addEventListener("click", openSettings);
document.getElementById("addAccount").addEventListener("click",()=>openAccount());
document.getElementById("addBudget").addEventListener("click",()=>openBudget());
document.getElementById("addGoal").addEventListener("click",()=>openGoal());

document.body.addEventListener("click", e=>{
  const tx=e.target.closest("[data-tx]"); if(tx){ const t=state.txns.find(x=>x.id===tx.dataset.tx); if(t) openTx(t); return; }
  const ac=e.target.closest("[data-acc]"); if(ac){ const a=state.accounts.find(x=>x.id===ac.dataset.acc); if(a) openAccount(a); return; }
  const bd=e.target.closest("[data-bud]"); if(bd){ const b=state.budgets.find(x=>x.id===bd.dataset.bud); if(b) openBudget(b); return; }
  const sv=e.target.closest("[data-addsave]"); if(sv){ openAddSave(sv.dataset.addsave); return; }
  const gl=e.target.closest("[data-goal]"); if(gl && !e.target.closest("[data-addsave]")){ const g=state.goals.find(x=>x.id===gl.dataset.goal); if(g) openGoal(g); return; }
});

/* ============ INICIO ============ */
render();
// Intentar tasa fresca al abrir (silencioso). Si falla, queda la cacheada.
fetchRates().then(ok=>{ if(ok) render(); });
</script>
</body>
</html>
